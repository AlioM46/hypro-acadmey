  <!-- Global script to catch blocked/broken images (e.g. Unsplash blocks) and replace with beautiful SVG placeholders -->
  <script>
    window.addEventListener('error', function(e) {
      if (e.target && e.target.tagName === 'IMG') {
        var img = e.target;
        if (img.src && !img.dataset.failed) {
          img.dataset.failed = "true";
          var title = img.alt || "HYPRO VISUAL ASSET";
          var cleanTitle = title.replace(/['"<>]/g, '');
          img.style.objectFit = "cover";
          img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='500' viewBox='0 0 800 500'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%231e293b' /><stop offset='100%' style='stop-color:%230f172a' /></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)'/><circle cx='400' cy='220' r='60' fill='%232563eb' opacity='0.15'/><polygon points='400,185 435,245 365,245' fill='%233b82f6' opacity='0.7'/><text x='50%' y='325' dominant-baseline='middle' text-anchor='middle' fill='%2394a3b8' font-family='sans-serif' font-size='14' font-weight='bold'>" + encodeURIComponent(cleanTitle.toUpperCase()) + "</text><text x='50%' y='355' dominant-baseline='middle' text-anchor='middle' fill='%23475569' font-family='sans-serif' font-size='10' font-weight='bold' letter-spacing='2'>HYPRO TECHNICAL NETWORK</text></svg>";
        }
      }
    }, true);
  </script>
